<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <h2 style="margin:0 0 8px 0;">Welcome to GivingHands!</h2>
    <p>Thank you for registering. Your organization account has been approved.</p>

    <p style="margin-top:14px;">
        You can now create and manage donation campaigns from your organization dashboard.
    </p>

    <p class="muted" style="margin-top:12px;">
        Organization: <strong th:text="${orgName}">Org Name</strong>
    </p>
</div>
</body>
</html>
