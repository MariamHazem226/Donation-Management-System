# Schema is managed manually via backend/database/*.sql (no runtime ALTER from Java)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Mail Configuration (Gmail SMTP — set env vars MAIL_USERNAME + MAIL_PASSWORD)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
givinghands.mail.enabled=true

# Notification infrastructure
givinghands.notification.from-name=GivingHands
givinghands.notification.async.enabled=true

# JWT (use a long random secret in production)
app.jwt.secret=GivingHandsChangeThisSecretKeyToAtLeast256BitsForHS256Algorithm!!
app.jwt.expiration-ms=86400000

# OAuth2 callback page (served from Spring Boot static folder)
app.oauth2.frontend-redirect-url=http://localhost:8080/oauth-callback.html

# Google OAuth2 — create credentials at https://console.cloud.google.com/
# Authorized redirect URI: http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com