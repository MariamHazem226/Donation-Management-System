<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing in… | GivingHands</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, sans-serif;
      background: #f8fafc;
      margin: 0;
    }
    .oauth-callback-card {
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 400px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e5e7eb;
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="oauth-callback-card">
    <div class="spinner"></div>
    <h2 style="margin:0 0 0.5rem;">Completing sign-in</h2>
    <p id="oauthStatus" style="color:#6b7280;margin:0;">Please wait…</p>
  </div>
  <script src="js/main.js"></script>
  <script>
    (async function handleOAuthCallback() {
      const status = document.getElementById('oauthStatus');
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const error = params.get('error');

      if (error) {
        status.textContent = 'Sign-in was cancelled or failed.';
        setTimeout(() => { window.location.href = 'login.html'; }, 2500);
        return;
      }

      if (!token) {
        status.textContent = 'Missing authentication token.';
        setTimeout(() => { window.location.href = 'login.html'; }, 2500);
        return;
      }

      try {
        if (typeof saveAccessToken === 'function') saveAccessToken(token);

        const res = await fetch('http://localhost:8080/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('Could not load profile');

        const user = await res.json();
        if (typeof saveCurrentUser === 'function') saveCurrentUser(user);

        status.textContent = 'Success! Redirecting…';
        const role = (typeof getCurrentUser === 'function' ? getCurrentUser()?.role : user.role) || 'USER';
        setTimeout(() => {
          if (typeof redirectByRole === 'function') redirectByRole(role);
          else if (role === 'ADMIN') window.location.href = 'admin-dashboard.html';
          else if (role === 'ORGANIZATION') window.location.href = 'organization.html';
          else window.location.href = 'profile.html';
        }, 600);
      } catch (e) {
        status.textContent = e.message || 'Sign-in failed.';
        setTimeout(() => { window.location.href = 'login.html'; }, 2500);
      }
    })();
  </script>
</body>
</html>
